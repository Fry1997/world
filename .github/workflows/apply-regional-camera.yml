name: Apply regional camera fixes

on:
  push:
    branches:
      - agent/regional-mastery-platform

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/regional-mastery-platform
      - name: Apply exact product fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          mastery = Path('learn/learn.js')
          source = mastery.read_text()
          marker = '''  };

  const countryByCode = new Map'''
          views = '''  };

  const REGION_VIEWS = {
    Europe: { rotate: [-15, -54, 0], points: [[-25, 34], [45, 73]] },
    Africa: { rotate: [-20, 0, 0], points: [[-28, -40], [65, 40]] },
    Asia: { rotate: [-95, -38, 0], points: [[25, -12], [150, 82]] },
    "North America": { rotate: [105, -45, 0], points: [[-175, 5], [-50, 85]] },
    "South America": { rotate: [60, 20, 0], points: [[-90, -60], [-30, 16]] },
    Oceania: { rotate: [-160, 15, 0], points: [[100, -50], [-130, 20]] }
  };

  const countryByCode = new Map'''
          if 'const REGION_VIEWS =' not in source:
              if marker not in source:
                  raise SystemExit('Could not locate region details marker')
              source = source.replace(marker, views, 1)

          old_camera = '''    const projectionFactory = d3.geoNaturalEarth1 || d3.geoMercator;
    const projection = projectionFactory();
    if (collection.features.length) projection.fitExtent([[38, 38], [922, 580]], collection);
    const path = d3.geoPath(projection);'''
          new_camera = '''    const projectionFactory = d3.geoNaturalEarth1 || d3.geoMercator;
    const projection = projectionFactory();
    const regionalView = activeSession.review ? null : REGION_VIEWS[activeSession.region];
    if (regionalView?.rotate && typeof projection.rotate === "function") projection.rotate(regionalView.rotate);
    const focusGeometry = regionalView
      ? { type: "MultiPoint", coordinates: regionalView.points }
      : collection;
    const hasFocus = focusGeometry.type === "MultiPoint"
      ? focusGeometry.coordinates.length > 0
      : focusGeometry.features.length > 0;
    if (hasFocus) projection.fitExtent([[38, 38], [922, 580]], focusGeometry);
    const path = d3.geoPath(projection);'''
          if old_camera in source:
              source = source.replace(old_camera, new_camera, 1)
          elif 'const regionalView = activeSession.review ? null' not in source:
              raise SystemExit('Could not locate projection setup')
          mastery.write_text(source)

          shell = Path('together/shared/product-shell.js')
          source = shell.read_text()
          old_mode = '''  function applyRequestedSoloMode() {
    if (!/^\\/?world\\/?$/.test(location.pathname) && !location.pathname.endsWith("/world/")) return;
    const requested = new URLSearchParams(location.search).get("mode");
    if (!requested || !["daily", "random"].includes(requested)) return;
    let attempts = 0;
    const timer = setInterval(() => {
      attempts += 1;
      const button = document.querySelector(`.mode-button[data-mode="${requested}"]`);
      if (button) {
        clearInterval(timer);
        if (!button.classList.contains("is-active")) button.click();
        history.replaceState({}, "", location.pathname);
      } else if (attempts > 100) clearInterval(timer);
    }, 40);
  }'''
          new_mode = '''  function applyRequestedSoloMode() {
    if (!/^\\/?world\\/?$/.test(location.pathname) && !location.pathname.endsWith("/world/")) return;
    const requested = new URLSearchParams(location.search).get("mode");
    if (!requested || !["daily", "random"].includes(requested)) return;
    try {
      const saved = JSON.parse(localStorage.getItem("nearer-game-v1") || "null") || {};
      saved.mode = requested;
      localStorage.setItem("nearer-game-v1", JSON.stringify(saved));
    } catch {}
    let attempts = 0;
    const timer = setInterval(() => {
      attempts += 1;
      const button = document.querySelector(`.mode-button[data-mode="${requested}"]`);
      if (button && !button.classList.contains("is-active")) button.click();
      if (button?.classList.contains("is-active") || attempts > 250) {
        clearInterval(timer);
        if (button?.classList.contains("is-active")) history.replaceState({}, "", location.pathname);
      }
    }, 40);
  }'''
          if old_mode in source:
              source = source.replace(old_mode, new_mode, 1)
          elif 'saved.mode = requested;' not in source:
              raise SystemExit('Could not locate solo mode handoff')
          shell.write_text(source)
          PY
      - name: Commit fixes
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "Nearer validation"
          git config user.email "actions@users.noreply.github.com"
          git add learn/learn.js together/shared/product-shell.js
          git commit -m "Focus regional maps and preserve mode handoff"
          git push origin HEAD:agent/regional-mastery-platform
