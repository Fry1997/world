name: Validate static app

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -type f -name '*.js' -not -path './.git/*' -print0)

      - name: Check HTML ids and local references
        run: python3 scripts/validate-html.py

      - name: Install application dependencies
        run: npm install --no-audit --no-fund

      - name: Build the Vercel output
        run: npm run build

      - name: Install Chromium for smoke testing
        run: npx playwright install --with-deps chromium > /dev/null

      - name: Smoke test the mobile application
        shell: bash
        run: |
          set -o pipefail
          npm run smoke 2>&1 | tee smoke.log

      - name: Upload browser smoke failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-log
          path: smoke.log
          if-no-files-found: ignore
