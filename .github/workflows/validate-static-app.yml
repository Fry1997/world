name: Validate static app

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -type f -name '*.js' -not -path './.git/*' -print0)

      - name: Check HTML ids and local references
        shell: bash
        run: |
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          from urllib.parse import urlsplit

          root = Path.cwd()
          errors = []

          class DocumentParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.ids = []
                  self.references = []
                  self.base_href = None

              def handle_starttag(self, tag, attrs):
                  values = dict(attrs)
                  if values.get('id'):
                      self.ids.append(values['id'])
                  if tag == 'base' and values.get('href'):
                      self.base_href = values['href']
                  for key in ('src', 'href'):
                      if values.get(key):
                          self.references.append(values[key])

          def resolve_reference(html_file: Path, base_href: str | None, reference: str):
              parsed = urlsplit(reference)
              if parsed.scheme or parsed.netloc or reference.startswith(('#', 'data:', 'mailto:', 'tel:', 'javascript:')):
                  return None
              path = parsed.path
              if not path:
                  return html_file

              if path.startswith('/world/'):
                  target = root / path.removeprefix('/world/')
              elif path.startswith('/'):
                  target = root / path.lstrip('/')
              elif base_href and base_href.startswith('/world/'):
                  base = root / base_href.removeprefix('/world/')
                  target = base / path
              else:
                  target = html_file.parent / path

              target = target.resolve()
              try:
                  target.relative_to(root.resolve())
              except ValueError:
                  return target

              if path.endswith('/') or target.is_dir():
                  target = target / 'index.html'
              return target

          for html_file in root.rglob('*.html'):
              if '.git' in html_file.parts:
                  continue
              parser = DocumentParser()
              parser.feed(html_file.read_text(encoding='utf-8'))

              seen = set()
              duplicates = sorted({value for value in parser.ids if value in seen or seen.add(value)})
              if duplicates:
                  errors.append(f"{html_file.relative_to(root)} has duplicate ids: {', '.join(duplicates)}")

              for reference in parser.references:
                  target = resolve_reference(html_file, parser.base_href, reference)
                  if target is None:
                      continue
                  if not target.exists():
                      errors.append(
                          f"{html_file.relative_to(root)} references missing file {reference} "
                          f"(resolved to {target.relative_to(root) if target.is_relative_to(root) else target})"
                      )

          if errors:
              print('\n'.join(f'- {error}' for error in errors))
              raise SystemExit(1)

          print('Static HTML validation passed.')
          PY

      - name: Install application dependencies
        run: npm install --no-audit --no-fund

      - name: Build the Vercel output
        run: npm run build

      - name: Install Chromium for smoke testing
        run: npx playwright install --with-deps chromium

      - name: Smoke test the mobile application
        run: npm run smoke
