name: Validate static site

on:
  pull_request:
  push:
    branches:
      - agent/regional-mastery-platform

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check JavaScript syntax
        run: find . -type f -name '*.js' -not -path './.git/*' -print0 | xargs -0 -n1 node --check
      - name: Check HTML references and duplicate IDs
        run: node scripts/validate-static.mjs
